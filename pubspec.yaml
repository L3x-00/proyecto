name: xtreme_performance
description: "Aplicación móvil para Xtreme Performance - Sistema de gestión de reparación de vehículos"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests
  http: ^1.6.0

  # State management
  provider: ^6.1.0

  # Storage local
  shared_preferences: ^2.2.2

  # UI
  intl: ^0.19.0

  # Networking
  dio: ^5.3.1

  # WebSockets / Tiempo real
  pusher_channels_flutter: ^2.6.0

  # Charts
  fl_chart: ^1.2.0

  # Notificaciones locales (panel de notificaciones del teléfono)
  flutter_local_notifications: ^22.0.1

  # Chat de voz: dictado (voz -> texto) y lectura de respuestas (texto -> voz)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Adjuntar fotos (cámara/galería) a los seguimientos de una orden
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # El paquete mágico para los íconos
  flutter_launcher_icons: ^0.13.1

# Configuración de tu nuevo ícono
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/favicon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/maestrito_bot.png
