name: xtreme_performance
description: "Aplicación móvil para Xtreme Performance - Sistema de gestión de reparación de vehículos"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  # HTTP requests
  http: ^1.1.0
  
  # State management
  provider: ^6.1.0
  
  # Storage local
  shared_preferences: ^2.2.2
  
  # UI
  intl: ^0.19.0
  
  # Networking
  dio: ^5.3.1

  # WebSockets / Tiempo real
  pusher_channels_flutter: ^2.6.0

  # Charts
  fl_chart: ^0.66.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png